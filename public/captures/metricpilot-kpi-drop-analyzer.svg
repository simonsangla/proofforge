<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">MetricPilot KPI Drop Analyzer</title>
  <desc id="desc">Structured visual for a KPI drop triage tool.</desc>
  <rect width="1200" height="800" fill="#f4efe8"/>
  <rect x="72" y="72" width="1056" height="656" rx="28" fill="#fffaf3" stroke="#d9cdbb"/>
  <text x="120" y="150" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="700" fill="#1f1a12">MetricPilot</text>
  <text x="120" y="198" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500" fill="#5f5648">KPI Drop Analyzer</text>
  <text x="120" y="262" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Turns a KPI dip into a fast read on likely drivers.</text>
  <g transform="translate(120 330)">
    <rect width="260" height="230" rx="22" fill="#ffffff" stroke="#d9cdbb"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#8b7d69">Signal</text>
    <text x="22" y="90" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f1a12">Revenue down</text>
    <text x="22" y="130" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Inspect segment.</text>
    <text x="22" y="160" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Find driver.</text>
  </g>
  <g transform="translate(420 330)">
    <rect width="260" height="230" rx="22" fill="#ffffff" stroke="#d9cdbb"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#8b7d69">Workflow</text>
    <text x="22" y="90" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f1a12">Compare slices</text>
    <text x="22" y="130" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Traffic.</text>
    <text x="22" y="160" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Activation.</text>
  </g>
  <g transform="translate(720 330)">
    <rect width="260" height="230" rx="22" fill="#ffffff" stroke="#d9cdbb"/>
    <text x="22" y="42" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2" fill="#8b7d69">Outcome</text>
    <text x="22" y="90" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f1a12">Next action</text>
    <text x="22" y="130" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Fast triage.</text>
    <text x="22" y="160" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4f4639">Clear direction.</text>
  </g>
</svg>
